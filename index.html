<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Models Pricing Explorer</title>
    <meta name="description" content="Browse, compare, and export AI model pricing from the Vercel AI Gateway. Filter by developer, model family, type, and capabilities.">
    <meta name="keywords" content="AI, LLM, pricing, OpenAI, Anthropic, Claude, GPT, Llama, models, comparison">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="AI Models Pricing Explorer">
    <meta property="og:description" content="Browse, compare, and export AI model pricing from the Vercel AI Gateway.">
    <meta property="og:image" content="https://fav.farm/%F0%9F%93%8A">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="AI Models Pricing Explorer">
    <meta name="twitter:description" content="Browse, compare, and export AI model pricing from the Vercel AI Gateway.">
    
    <!-- Favicon: Chart Emoji -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Models Pricing Explorer</h1>
            <div class="header-actions">
                <span id="selection-stats">0 selected</span>
                <span id="cache-status" class="cache-status"></span>
            </div>
        </header>

        <!-- Mobile Toggle Button -->
        <button id="filter-toggle" class="btn filter-toggle">
            <span class="toggle-icon">▼</span> Filters & Export
        </button>

        <section class="controls" id="controls-section">
            <div class="filter-row">
                <div class="filter-group relative">
                    <label for="search">Search</label>
                    <input type="text" id="search" placeholder="Filter by Name, ID...">
                </div>
                
                <div class="filter-group relative">
                    <label>Developer</label>
                    <div class="multiselect-dropdown" id="provider-dropdown-container">
                        <div class="select-box" id="provider-select-box">
                            <span id="provider-selected-text">All Developers</span>
                            <span class="arrow">&#9662;</span>
                        </div>
                        <div class="checkboxes" id="provider-checkboxes"></div>
                    </div>
                </div>

                <div class="filter-group relative">
                    <label>Model Family</label>
                    <div class="multiselect-dropdown" id="family-dropdown-container">
                        <div class="select-box" id="family-select-box">
                            <span id="family-selected-text">All Families</span>
                            <span class="arrow">&#9662;</span>
                        </div>
                        <div class="checkboxes" id="family-checkboxes"></div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Type</label>
                    <div class="multiselect-dropdown" id="type-dropdown-container">
                        <div class="select-box" id="type-select-box">
                            <span id="type-selected-text">All Types</span>
                            <span class="arrow">&#9662;</span>
                        </div>
                        <div class="checkboxes" id="type-checkboxes"></div>
                    </div>
                </div>

                <div class="filter-group relative">
                    <label>Capabilities</label>
                    <div class="multiselect-dropdown" id="tags-dropdown-container">
                        <div class="select-box" id="tags-select-box">
                            <span id="tags-selected-text">Select Capabilities...</span>
                            <span class="arrow">&#9662;</span>
                        </div>
                        <div class="checkboxes" id="tags-checkboxes"></div>
                    </div>
                </div>
            </div>

            <div class="export-row">
                <button id="btn-csv" class="btn">Export CSV</button>
                <button id="btn-json" class="btn">Export JSON</button>
                <button id="btn-html" class="btn">Export HTML</button>
                <button id="btn-reset-widths" class="btn">Reset Column Widths</button>
                <button id="btn-refresh" class="btn primary">Refresh Data</button>
            </div>

        </section>

        <div id="compare-bar" class="compare-inline hidden" aria-live="polite">
            <span id="compare-info">Select 2 or more models to compare</span>
            <button id="btn-compare" class="btn primary" disabled>Compare Selected</button>
            <button id="btn-exit-compare" class="btn hidden">Exit Compare</button>
        </div>

        <div class="table-container">
            <table id="models-table">
                <thead>
                    <tr id="table-header-row"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        
        <div id="loading" class="loading">Loading models...</div>
        <div id="error" class="error hidden"></div>
        <footer>
            <span id="model-count">0 models</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
